name: Deploy live demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate the static demo report
        run: |
          mkdir -p site
          python - <<'PY'
          import html
          import os
          import sys
          sys.path.insert(0, "sim")
          from agent import Agent
          from conversation import Conversation

          WORKPLACE_SINGLE = [
              "How do I reset my password?",
              "How many PTO days do new employees get?",
              "Who do I contact about a security incident?",
              "I want a refund on my subscription",
              "What is the airspeed velocity of an unladen swallow?",
          ]
          WORKPLACE_MULTI = [
              "How many PTO days do new employees get?",
              "What about for managers?",
              "And the carryover rules?",
          ]
          SAAS_SINGLE = [
              "How much does the Team plan cost?",
              "Does the product support SSO with Okta?",
              "My Slack integration stopped syncing - how do I fix it?",
              "I would like to cancel my account today",
          ]

          def fmt(r, q):
              if r.escalated:
                  body = f'<span class="esc">[escalated, {html.escape(r.reason)}]</span> {html.escape(r.answer)}'
              else:
                  cites = ", ".join(f"[{i+1}] {html.escape(s.doc)}"
                                    for i, s in enumerate(r.sources))
                  body = f"{html.escape(r.answer)}<br><span class='cite'>sources: {cites}</span>"
              return (f'<div class="qa"><p class="q"><strong>You:</strong> '
                      f'{html.escape(q)}</p><p class="a">{body}</p></div>')

          def single_turn_block(label, data_dir, questions):
              agent = Agent(data_dir)
              parts = [f'<h2>{html.escape(label)}</h2>']
              parts.append(f'<p class="meta">Corpus: <code>{html.escape(data_dir)}/</code> '
                           f'(single-turn agent.ask)</p>')
              for q in questions:
                  parts.append(fmt(agent.ask(q), q))
              return ''.join(parts)

          def multi_turn_block(label, data_dir, questions):
              conv = Conversation(Agent(data_dir))
              parts = [f'<h2>{html.escape(label)}</h2>']
              parts.append('<p class="meta">Multi-turn: prior questions get re-injected '
                           'into retrieval only when the bare query is uncertain.</p>')
              for q in questions:
                  parts.append(fmt(conv.ask(q), q))
              return ''.join(parts)

          page = f"""<!DOCTYPE html>
          <html lang="en"><head><meta charset="utf-8">
          <title>Copilot Studio support agent - live demo</title>
          <style>
            body{{font-family:Segoe UI,Arial,sans-serif;max-width:820px;margin:2.5rem auto;padding:0 1.5rem;color:#222;background:#f3f4f6}}
            h1{{font-size:1.5rem;margin-bottom:.25rem}}
            h2{{font-size:1.15rem;border-left:4px solid #2b6cb0;padding-left:10px;margin-top:2rem}}
            .lead{{color:#555;font-size:.95rem;margin-top:.25rem}}
            .meta{{color:#888;font-size:.85rem}}
            a{{color:#2b6cb0}}
            code{{background:#eef0f3;padding:1px 6px;border-radius:4px;font-size:.9em}}
            .qa{{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:.85rem 1rem;margin:.6rem 0}}
            .q{{margin:0 0 .35rem;color:#374151}}
            .a{{margin:0;font-size:.95rem}}
            .esc{{display:inline-block;background:#fff7e6;color:#a06000;padding:1px 8px;border-radius:10px;font-size:.8rem;margin-right:.4rem}}
            .cite{{color:#666;font-size:.85em}}
          </style>
          </head><body>
          <h1>Copilot Studio support agent - live demo</h1>
          <p class="lead">A transcript of the offline simulator answering sample questions
          against the agent's two corpora, regenerated on every push.</p>

          {single_turn_block("Workplace corpus (HR / IT / Security) - single-turn",
                             "sim/data", WORKPLACE_SINGLE)}
          {multi_turn_block("Workplace corpus - multi-turn (follow-ups inherit topic context)",
                            "sim/data", WORKPLACE_MULTI)}
          {single_turn_block("SaaS support corpus (product / billing / troubleshooting) - single-turn",
                             "sim/data-saas", SAAS_SINGLE)}

          <p class="meta" style="margin-top:2.5rem">Generated on every push by the simulator
          - no LLM keys required.
          Source: <a href="https://github.com/derekgallardo01/copilot-studio-support-agent">github.com/derekgallardo01/copilot-studio-support-agent</a></p>
          </body></html>
          """
          with open("site/index.html", "w", encoding="utf-8") as fh:
              fh.write(page)
          print("wrote site/index.html")
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
